name: Daily MLB Strikeout Props

on:
  schedule:
    - cron: '0 6 * * *'      # Every day at 6:00 AM UTC
  workflow_dispatch:

jobs:
  compute-k-props:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run daily computation
        run: python compute_daily_k_props.py

      - name: Commit and push daily_k_props.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add the file
          git add daily_k_props.json

          # If there are changes, commit them
          if ! git diff --staged --quiet; then
            git commit -m "Update daily K props for $(date +'%Y-%m-%d')"
            
            # Try normal push first, fallback to force push if needed
            if ! git push; then
              echo "Normal push failed, using force push to overwrite..."
              git push --force
            fi
            echo "✅ Successfully pushed daily_k_props.json"
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
