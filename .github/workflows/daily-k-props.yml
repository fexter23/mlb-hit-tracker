name: Daily MLB Strikeout Props

on:
  schedule:
    # Runs every day at 6:00 AM UTC (recommended morning time)
    # This is ~2 AM EDT / 1 AM EST (adjust if you prefer a different time)
    - cron: '0 6 * * *'
  
  # Allows you to run it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  compute-k-props:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run daily strikeout props computation
        run: python compute_daily_k_props.py

      - name: Commit and push updated daily_k_props.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_k_props.json
          git commit -m "Update daily K props for $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
